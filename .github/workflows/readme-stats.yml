name: Update Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=csxark&theme=tokyonight&hide_border=true&background=0D1117&ring=22D3EE&fire=22D3EE&currStreakLabel=22D3EE&sideLabels=22D3EE&currStreakNum=C9D1D9&sideNums=C9D1D9&dates=6E7681
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophies
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: csxark
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: tokyonight

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg profile/trophy.svg
          git commit -m "chore: update stats [skip ci]" || exit 0
          git push
