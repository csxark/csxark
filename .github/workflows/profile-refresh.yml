name: Refresh profile assets

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  push:
    paths:
      - ".github/workflows/profile-refresh.yml"
      - "scripts/**"
      - "data/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate ASCII portrait
        run: |
          python3 scripts/generate_ascii.py data/photo.jpg ark-ascii.svg \
            --cols 78 --crop 500,440,1120,1300 --user ark --name Ark

      - name: Generate info card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_infocard.py ark info-card.svg --fetch-user csxark

      - name: Generate contribution heatmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_heatmap.py csxark contrib-heatmap.svg

      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ark-ascii.svg info-card.svg contrib-heatmap.svg
          git commit -m "chore: refresh profile assets" || exit 0
          git push
